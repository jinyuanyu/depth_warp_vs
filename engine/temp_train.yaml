data:
  batch_size: 2
  img_size:
  - 128
  - 128
  max_epochs: 1
device: cpu
loss:
  edgeaware: 0.05
  l1: 1.0
  ssim: 0.2
  tv: 0.05
  vgg: 0.1
model:
  grid:
    align_corners: true
  refiner:
    base_ch: 16
    depth: 3
    in_ch: 5
    out_ch: 3
  residual_flow_net:
    base_ch: 16
    in_ch: 5
  softmax_splat:
    normalize: true
    temperature: 10.0
optim:
  betas:
  - 0.9
  - 0.999
  lr: 0.0001
  weight_decay: 0.01
seed: 42
